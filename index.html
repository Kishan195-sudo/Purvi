<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Purnima</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #d63384; font-size: 1.8rem; min-height: 80px; }
        .buttons { margin-top: 30px; position: relative; height: 150px; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            left: 55%;
        }
        .hidden { display: none; }
        img { width: 150px; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container" id="quizCard">
        <img id="displayGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp3bm53Z3R3bm53Z3R3bm53Z3R3bm53Z3R3bm53Z3R3bm53JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute GIF">
        <h1 id="questionText">Purnima, will you be mine forever? ❤️</h1>
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div class="container hidden" id="successCard">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp3bm53Z3R3bm53Z3R3bm53Z3R3bm53Z3R3bm53Z3R3bm53JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/26FLdmIp6wJr91JAI/giphy.gif" alt="Happy GIF">
        <h1>I knew it! Love you the most! 💖</h1>
        <p>30th April aur Tokyo trip, dono ka wait hai! 💍🏯</p>
    </div>

    <script>
        const questions = [
            "Purnima, will you be mine forever? ❤️",
            "Kya aap hamesha mere gusse ko handle karogi? 🥺",
            "Next trip par kya hum Tokyo chalein? 🗼🌸",
            "Kya aap 30 April ko duniya ki sabse sundar dulhan banogi? 👰",
            "Ek last baar... do you love me the most? 🥰"
        ];

        let currentQuestionIndex = 0;

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionText = document.getElementById('questionText');
        const quizCard = document.getElementById('quizCard');
        const successCard = document.getElementById('successCard');

        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNoButton();
        });

        yesBtn.addEventListener('click', () => {
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                questionText.innerText = questions[currentQuestionIndex];
                noBtn.style.position = 'absolute';
                noBtn.style.left = '55%';
                noBtn.style.top = 'auto';
            } else {
                quizCard.classList.add('hidden');
                successCard.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
